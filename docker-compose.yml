services:
  postgres:
    image: postgres:16-alpine
    container_name: communique-postgres
    environment:
      POSTGRES_USER: communique
      POSTGRES_PASSWORD: communique
      POSTGRES_DB: communique
    ports:
      - '5432:5432'
    volumes:
      - communique-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U communique']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: communique-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: local SMTP catcher so a real SMTP provider can be demoed without a SaaS account.
  # Web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: communique-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  communique-pg:
